name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-arm64:
    name: macOS arm64 (Metal + Accelerate)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: >
          cargo build
          --workspace
          --exclude moe-stream-desktop
          --exclude moe-stream-python
          --features metal,accelerate

      - name: Test (lib + bins only)
        run: >
          cargo test
          --workspace
          --exclude moe-stream-desktop
          --exclude moe-stream-python
          --features metal,accelerate
          --lib --bins

  linux-x86_64:
    name: Linux x86_64 (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: >
          cargo build
          --workspace
          --exclude moe-stream-desktop
          --exclude moe-stream-python

      - name: Test (lib + bins only)
        run: >
          cargo test
          --workspace
          --exclude moe-stream-desktop
          --exclude moe-stream-python
          --lib --bins

  linux-cuda:
    name: Linux CUDA (build only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.18
        with:
          cuda: "12.4.1"
          method: local

      - name: Build with CUDA
        run: >
          cargo build
          --workspace
          --exclude moe-stream-desktop
          --exclude moe-stream-python
          --features cuda

  clippy-linux:
    name: Clippy (Linux, no features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: >
          cargo clippy
          --workspace
          --exclude moe-stream-desktop
          --exclude moe-stream-python
          --lib --bins
          --
          -W clippy::all
          -A clippy::manual_is_multiple_of
          -A clippy::manual_div_ceil
          -A clippy::needless_range_loop
          -A clippy::derivable_impls
          -A clippy::needless_borrow
          -A clippy::too_many_arguments
          -A clippy::manual_flatten

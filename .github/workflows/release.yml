name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-arm64:
    name: macOS arm64 binary
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build moe-stream (core CLI)
        run: >
          cargo build --release
          -p moe-stream-core
          --bin moe-stream
          --features metal,accelerate

      - name: Build moe-stream-server
        run: >
          cargo build --release
          -p moe-stream-server
          --features metal,accelerate

      - name: Build moe-stream-cli (agent)
        run: >
          cargo build --release
          -p moe-stream-agent
          --bin moe-stream-cli
          --features metal,accelerate

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="moe-stream-${TAG}-macos-arm64.tar.gz"
          mkdir -p dist
          cp target/release/moe-stream dist/
          cp target/release/moe-stream-server dist/
          cp target/release/moe-stream-cli dist/
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ env.ARCHIVE }}

  linux-x86_64:
    name: Linux x86_64 binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build moe-stream (core CLI)
        run: >
          cargo build --release
          -p moe-stream-core
          --bin moe-stream

      - name: Build moe-stream-server
        run: >
          cargo build --release
          -p moe-stream-server

      - name: Build moe-stream-cli (agent)
        run: >
          cargo build --release
          -p moe-stream-agent
          --bin moe-stream-cli

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="moe-stream-${TAG}-linux-x86_64.tar.gz"
          mkdir -p dist
          cp target/release/moe-stream dist/
          cp target/release/moe-stream-server dist/
          cp target/release/moe-stream-cli dist/
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ env.ARCHIVE }}

  create-release:
    name: Create GitHub Release
    needs: [macos-arm64, linux-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*.tar.gz
            artifacts/linux-x86_64/*.tar.gz
          body: |
            ## moe-stream ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS arm64 (Apple Silicon) | `moe-stream-${{ github.ref_name }}-macos-arm64.tar.gz` |
            | Linux x86_64 | `moe-stream-${{ github.ref_name }}-linux-x86_64.tar.gz` |

            ### Included binaries
            - `moe-stream` - CLI inference engine
            - `moe-stream-server` - OpenAI-compatible HTTP server
            - `moe-stream-cli` - MCP agent client

            ### Notes
            - macOS build includes Metal + Accelerate framework support
            - Linux build is CPU-only (no CUDA)
